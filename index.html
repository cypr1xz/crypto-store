<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Best Server</title>
    <style>
        :root {
            --primary: #5865F2;
            --accent: #ff0055; /* Neon Pink/Red for the cursor */
            --bg: #050505;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            cursor: none; /* Hide real cursor */
        }

        body {
            background-color: var(--bg);
            color: white;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        /* --- New Crosshair Cursor --- */
        #cursor-main {
            position: fixed;
            width: 40px;
            height: 40px;
            border: 1px solid var(--accent);
            border-radius: 50%;
            pointer-events: none;
            z-index: 9999;
            transition: transform 0.1s ease-out, background 0.3s;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        #cursor-dot {
            width: 4px;
            height: 4px;
            background: white;
            border-radius: 50%;
        }

        /* --- Background Effects --- */
        .bg-grid {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: 
                linear-gradient(rgba(255, 255, 255, 0.05) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255, 255, 255, 0.05) 1px, transparent 1px);
            background-size: 50px 50px;
            z-index: -1;
        }

        /* --- Main Content --- */
        .content {
            text-align: center;
            z-index: 10;
        }

        h1 {
            font-size: 5rem;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 5px;
            margin-bottom: 10px;
            color: #fff;
            text-shadow: 0 0 20px var(--primary);
        }

        .server-btn {
            background: transparent;
            color: white;
            border: 2px solid white;
            padding: 20px 50px;
            font-size: 1.5rem;
            font-weight: bold;
            letter-spacing: 2px;
            text-decoration: none;
            display: inline-block;
            transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            margin-top: 30px;
        }

        .server-btn:hover {
            background: white;
            color: black;
            transform: scale(1.1);
            box-shadow: 0 0 50px white;
        }

        /* --- Infinite Passage --- */
        .ticker {
            position: fixed;
            bottom: 30px;
            white-space: nowrap;
            width: 100%;
            overflow: hidden;
            border-top: 1px solid rgba(255,255,255,0.1);
            padding: 20px 0;
        }

        .ticker-inner {
            display: inline-block;
            animation: moveTicker 25s linear infinite;
        }

        .ticker-inner span {
            font-size: 2rem;
            font-weight: 200;
            padding: 0 50px;
            opacity: 0.3;
        }

        @keyframes moveTicker {
            0% { transform: translateX(0); }
            100% { transform: translateX(-50%); }
        }

        /* --- Hover State for Cursor --- */
        .hovering #cursor-main {
            transform: scale(1.5);
            background: rgba(255, 0, 85, 0.2);
            border-color: #fff;
        }
    </style>
</head>
<body>

    <div id="cursor-main"><div id="cursor-dot"></div></div>
    <div class="bg-grid"></div>

    <div class="content">
        <h1>THE BEST SERVER</h1>
        <p style="opacity: 0.6;">Stop searching. You found it.</p>
        
        <a href="https://discord.gg/nR94xXcY" class="server-btn" onmouseover="addHover()" onmouseout="removeHover()">
            OPEN SERVER
        </a>
    </div>

    <div class="ticker">
        <div class="ticker-inner">
            <span>THE BEST SERVER</span>
            <span>WHY IT'S THE BEST</span>
            <span>NO ONE ELSE COMPARES</span>
            <span>BEST COMMUNITY</span>
            <span>JOIN NOW</span>
            <span>THE BEST SERVER</span>
            <span>WHY IT'S THE BEST</span>
            <span>NO ONE ELSE COMPARES</span>
            <span>BEST COMMUNITY</span>
            <span>JOIN NOW</span>
        </div>
    </div>

    <script>
        const cursor = document.getElementById('cursor-main');
        
        // Follow Mouse
        document.addEventListener('mousemove', (e) => {
            cursor.style.left = e.clientX - 20 + 'px';
            cursor.style.top = e.clientY - 20 + 'px';
        });

        // Hover effect functions
        function addHover() {
            document.body.classList.add('hovering');
        }

        function removeHover() {
            document.body.classList.remove('hovering');
        }
    </script>
</body>
</html>
